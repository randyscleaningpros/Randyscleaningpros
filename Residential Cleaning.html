<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <meta
    name="description"
    content="Friendly, dependable residential cleaning services from Randy's Cleaning Pros in Southern Maine."
  >

  <title>Residential Cleaning | Randy's Cleaning Pros</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  >

  <link
    href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,600;0,700;0,800;1,600;1,700&family=Open+Sans:wght@400;600;700&display=swap"
    rel="stylesheet"
  >

  <!-- Favicon -->
  <link
    rel="icon"
    type="image/png"
    href="smalllogo.PNG"
  >

  <style>
    :root {
      --navy: #010e38;
      --navy-light: #09235f;
      --green: #579b12;
      --green-dark: #3f7609;
      --gold: #e4b63f;
      --white: #ffffff;
      --off-white: #f6f8fb;
      --light-gray: #e7ebf1;
      --text-dark: #172033;
      --text-soft: #5f6877;

      --shadow: 0 14px 35px rgba(1, 14, 56, 0.14);
      --radius: 20px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: "Open Sans", Arial, sans-serif;
      background: var(--off-white);
      color: var(--text-dark);
      line-height: 1.7;
    }

    img {
      max-width: 100%;
      display: block;
    }

    a {
      text-decoration: none;
    }

    .container {
      width: min(1120px, 92%);
      margin: 0 auto;
    }

    /* Header */

    .site-header {
      background: var(--navy);
      border-bottom: 3px solid var(--green);
    }

    .header-inner {
      min-height: 92px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      padding: 14px 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .brand-logo {
      width: 76px;
      height: 76px;
      object-fit: contain;
    }

    .brand-name {
      font-family: "Montserrat", sans-serif;
      font-size: clamp(1.05rem, 2vw, 1.55rem);
      font-style: italic;
      font-weight: 700;
      line-height: 1.05;
    }

    .brand-name .randys {
      color: var(--white);
      display: block;
    }

    .brand-name .cleaning-pros {
      color: var(--green);
      display: block;
    }

    .main-nav {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 10px;
    }

    .main-nav a {
      color: var(--white);
      font-family: "Montserrat", sans-serif;
      font-size: 0.88rem;
      font-weight: 700;
      padding: 10px 13px;
      border-radius: 999px;
      transition: 0.2s ease;
    }

    .main-nav a:hover,
    .main-nav a:focus {
      background: var(--green);
      color: var(--white);
    }

    /* Hero */

    .hero {
      background:
        linear-gradient(
          rgba(1, 14, 56, 0.87),
          rgba(1, 14, 56, 0.92)
        ),
        url("Serves.PNG") center / cover no-repeat;
      color: var(--white);
      padding: 95px 0;
      text-align: center;
    }

    .hero-content {
      max-width: 800px;
      margin: 0 auto;
    }

    .eyebrow {
      color: var(--gold);
      font-family: "Montserrat", sans-serif;
      font-weight: 800;
      letter-spacing: 0.11em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .hero h1 {
      font-family: "Montserrat", sans-serif;
      font-size: clamp(2.4rem, 7vw, 4.7rem);
      line-height: 1.08;
      margin-bottom: 20px;
    }

    .hero h1 span {
      color: var(--green);
    }

    .hero-text {
      max-width: 700px;
      margin: 0 auto 32px;
      color: #eef2f7;
      font-size: 1.1rem;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 14px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 52px;
      padding: 13px 24px;
      border-radius: 999px;
      font-family: "Montserrat", sans-serif;
      font-weight: 800;
      transition: 0.2s ease;
    }

    .button-primary {
      background: var(--green);
      color: var(--white);
      box-shadow: 0 10px 24px rgba(87, 155, 18, 0.3);
    }

    .button-primary:hover,
    .button-primary:focus {
      background: var(--green-dark);
      transform: translateY(-2px);
    }

    .button-secondary {
      color: var(--white);
      border: 2px solid var(--gold);
    }

    .button-secondary:hover,
    .button-secondary:focus {
      background: var(--gold);
      color: var(--navy);
      transform: translateY(-2px);
    }

    /* Sections */

    .section {
      padding: 80px 0;
    }

    .section-white {
      background: var(--white);
    }

    .section-title {
      max-width: 760px;
      margin: 0 auto 42px;
      text-align: center;
    }

    .section-title h2 {
      font-family: "Montserrat", sans-serif;
      color: var(--navy);
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1.2;
      margin-bottom: 14px;
    }

    .section-title p {
      color: var(--text-soft);
      font-size: 1.05rem;
    }

    .quote {
      max-width: 760px;
      margin: 0 auto 34px;
      padding: 20px 24px;
      background: #f2f7ec;
      border-left: 5px solid var(--green);
      border-radius: 12px;
      color: var(--navy);
      font-family: "Montserrat", sans-serif;
      font-size: 1.08rem;
      font-style: italic;
      font-weight: 700;
      text-align: center;
    }

      max-width: 900px;
      margin: 0 auto;
